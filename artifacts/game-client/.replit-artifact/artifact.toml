kind = "web"
previewPath = "/"
title = "Tower Seekers"
version = "1.0.0"
id = "artifacts/game-client"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18508

[services.development]
run = "pnpm --filter @workspace/game-client run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/game-client", "run", "build" ]
publicDir = "artifacts/game-client/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18508"
BASE_PATH = "/"
